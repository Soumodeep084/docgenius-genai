<div class="card shadow p-4 rounded-4">
  <h3 class="fw-bold mb-3 text-success"><i class="bi bi-card-text me-2"></i>Summarizer</h3>

  <div class="form-check form-check-inline">
    <input class="form-check-input" type="radio" name="summaryMode" id="pdfOption" value="pdf" checked>
    <label class="form-check-label" for="pdfOption">PDF</label>
  </div>
  <div class="form-check form-check-inline mb-3">
    <input class="form-check-input" type="radio" name="summaryMode" id="textOption" value="text">
    <label class="form-check-label" for="textOption">Text</label>
  </div>

  <div class="mb-3">
    <label for="summaryLength" class="form-label fw-semibold">Summary Length</label>
    <select id="summaryLength" class="form-select rounded-3">
      <option value="short">Short</option>
      <option value="long" selected>Long</option>
    </select>
  </div>

  <div id="summaryPdfSection" class="mb-3">
    <label class="form-label fw-semibold">Upload PDF</label>
    <input type="file" id="summaryFile" class="form-control rounded-3">
  </div>

  <div id="summaryTextSection" style="display: none;" class="mb-3">
    <label class="form-label fw-semibold">Paste Text</label>
    <textarea id="summaryText" rows="5" class="form-control rounded-3" placeholder="Paste your text here..."></textarea>
  </div>

  <button id="summarySubmitBtn" class="btn btn-gradient-primary btn-lg w-100" onclick="submitSummarizer()">
    <i class="bi bi-lightning me-2"></i>Summarize
  </button>

  <div id="summaryResult" class="mt-4"></div>
</div>
