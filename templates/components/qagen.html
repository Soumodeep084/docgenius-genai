<div class="card shadow p-4 rounded-4">
    <h3 class="fw-bold mb-3 text-primary"><i class="bi bi-question-circle me-2"></i>Q&A Generator</h3>

    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="qaMode" id="qaPdfOption" value="pdf" checked>
        <label class="form-check-label" for="qaPdfOption">PDF</label>
    </div>
    <div class="form-check form-check-inline mb-3">
        <input class="form-check-input" type="radio" name="qaMode" id="qaTextOption" value="text">
        <label class="form-check-label" for="qaTextOption">Text</label>
    </div>

    <div class="mb-3">
        <label for="qaN" class="form-label fw-semibold">Number of Q&A Pairs <span class="text-danger">*</span></label>
        <input type="number" id="qaN" class="form-control rounded-3" value="5" min="1" max="50">
    </div>

    <div id="qaPdfSection" class="mb-3">
        <label class="form-label fw-semibold">Upload PDF <span class="text-danger">*</span></label>
        <input type="file" id="qaFile" class="form-control rounded-3">
    </div>

    <div id="qaTextSection" style="display: none;" class="mb-3">
        <label class="form-label fw-semibold">Paste Text <span class="text-danger">*</span></label>
        <textarea id="qaText" rows="5" class="form-control rounded-3" placeholder="Paste your text here..."></textarea>
    </div>

    <button id="qaSubmitBtn" class="btn btn-gradient-secondary btn-lg w-100" onclick="submitQAGen()">
        <i class="bi bi-lightbulb me-2"></i>Generate Q&A
    </button>

    <div id="qaResult" class="mt-4"></div>
</div>
